name: Build .deb on release

# When a GitHub release is published, build the indicator into a .deb and
# attach it to that release.
on:
  release:
    types: [published]

permissions:
  contents: write  # needed to upload the release asset

jobs:
  deb:
    runs-on: ubuntu-24.04  # same base as elementary OS 8 (noble)
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo add-apt-repository -y ppa:elementary-os/stable
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson valac dpkg-dev libglib2.0-bin \
            libwingpanel-dev libgtk-3-dev libcairo2-dev libgee-0.8-dev \
            libglib2.0-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Build .deb
        run: |
          version="${GITHUB_REF_NAME#v}"   # strip a leading "v" if the tag has one
          packaging/build-deb.sh "$version"

      - name: Attach .deb to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" shelf-mirror_*.deb --clobber

name: Build .deb on release

# Build the indicator into a .deb (amd64 + arm64) and attach both to the
# release. Runs automatically when a release is published, and can be run
# manually against an existing tag via "Run workflow".
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach the .deb to"
        required: true

permissions:
  contents: write  # needed to upload the release asset

jobs:
  deb:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, arch: amd64 }       # x86_64
          - { runner: ubuntu-24.04-arm, arch: arm64 }   # aarch64
    steps:
      - name: Resolve release tag
        run: echo "TAG=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}

      - name: Install build dependencies
        run: |
          sudo add-apt-repository -y ppa:elementary-os/stable
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson valac dpkg-dev libglib2.0-bin \
            libwingpanel-dev libgtk-3-dev libcairo2-dev libgee-0.8-dev \
            libglib2.0-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Build .deb
        run: |
          version="${TAG#v}"   # strip a leading "v" if the tag has one
          packaging/build-deb.sh "$version"

      - name: Attach .deb to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" shelf-mirror_*.deb --clobber
